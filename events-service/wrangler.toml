name = "events-service"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Create the DB with `pnpm db:create`, then paste the printed database_id here.
[[d1_databases]]
binding = "DB"
database_name = "anime-cons-db"
database_id = "PLACEHOLDER_RUN_pnpm_db_create"

[observability]
enabled = true

# ADMIN_TOKEN is a secret, not a var:
#   local:  put it in .dev.vars
#   remote: npx wrangler secret put ADMIN_TOKEN
